services:
  postgres:
    image: postgres:18
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports: 
      - "${DB_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT}:6379"
volumes:
  pg_data: